BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-gateway-dk"
BBFILE_PATTERN_meta-gateway-dk = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-gateway-dk = "10"

LAYERDEPENDS_meta-gateway-dk = "core"
LAYERSERIES_COMPAT_meta-gateway-dk = "scarthgap"
